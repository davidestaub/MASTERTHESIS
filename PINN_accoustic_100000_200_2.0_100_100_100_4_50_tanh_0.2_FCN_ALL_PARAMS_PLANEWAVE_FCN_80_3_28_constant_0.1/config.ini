[parameters]
lambda_solid = 20.0
mu_solid = 30.0
rho_solid = 100.0
c2 = 1.0
mu_quake_x = 0
mu_quake_y = 0
mu_quake_x1 = 0
mu_quake_y1 = -0.2
mu_quake_x2 = 0
