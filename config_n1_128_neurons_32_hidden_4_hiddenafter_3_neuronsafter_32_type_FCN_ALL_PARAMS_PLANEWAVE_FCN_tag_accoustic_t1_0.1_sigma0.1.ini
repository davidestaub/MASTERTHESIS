[parameters]
lambda_solid = 20.0
mu_solid = 30.0
rho_solid = 100.0
c2 = 1.0
mu_quake_x = 0
mu_quake_y = 0
mu_quake_x1 = 0
mu_quake_y1 = -0.2
mu_quake_x2 = 0
mu_quake_y2 = 0.2
#Options: constant, mixture,layered,layered_sine
model_type= constant
sigma_quake = 0.1
radius = 0.2
T=0.02
M0 =0.1

[Network]
n_hidden_layers = 4
n_neurons = 32
activation=tanh
n_points=10000
conditioning = False
#Options are: Pinns,Global_NSources_Conditioned_Pinns,Relative_Distance_NSources_Conditioned_Pinns,Relative_Distance_FullDomain_Conditioned_Pinns,Global_NSources_Conditioned_Lame_Pinns
model_type = Pinns
curriculum = False
reduced_computation = False
# SIREN or BESSEL_FCN or PLANE_WAVE_FCN OR PINN OR MORLET_WAVELET_FCN OR NONLINEAR_WAVELET_FCN
nn_type = FCN_ALL_PARAMS_PLANEWAVE_FCN
#SIREN params only:
n_1=128
n_hidden_layers_after = 3
n_neurons_after = 32


[visualize]
visualize_on=False

[description]
tag=accoustic

[optimizer]
max_iter=100
max_eval=100
history_size=100
n_epochs=200
lr=2.0

[initial_condition]
# Option are: explosion, explosion_conditioned ,explosion_two_sources, gaussian and donut
# For unconditioned models explosion is reccomended, for conditioned models explosion_conditioned is neccessary
source_function = explosion
a=5.0
b=2.0
t1=0.1
n_sources=100

[domain]
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0
tmin = 0.0
tmax = 1.0
#lower and upper bounds for random source location
#must be between [xmin,xmax] and [ymin,ymax] respectively
source_xmin = -0.5
source_xmax = 0.5
source_ymin = -0.5
source_ymax = 0.5

[test]
test_on = True

[accoustic]
accoustic_on=True
velocity=1.0




